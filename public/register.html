<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Express - Register</title>
  <!-- Google Fonts - Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="css/login-style.css">
</head>
<body>
  <div class="split-container">
    <!-- Left Panel: Delivery Illustration & Banner (Matches Login Page) -->
    <div class="left-panel">
      <div class="floating-bg-icons">
        <span class="bg-icon">🍔</span>
        <span class="bg-icon">🍕</span>
        <span class="bg-icon">🍟</span>
        <span class="bg-icon">🍩</span>
        <span class="bg-icon">🥑</span>
        <span class="bg-icon">🌮</span>
      </div>
      <div class="illustration-content">
        <img src="delivery.png" alt="Food Express Delivery" class="delivery-img">
        <h1 class="delivery-heading">Delicious Food Delivered Fast</h1>
        <p class="delivery-sub">Order your favorite meals anytime, anywhere</p>
      </div>
    </div>

    <!-- Right Panel: Glassmorphism Register Card (Matches Login Page Structure) -->
    <div class="right-panel">
      <div class="login-card-wrapper" style="margin-top: 30px; margin-bottom: 30px;">
        <div class="login-card">
          <!-- Logo -->
          <div class="logo-container">
            <span class="logo-icon">🍔</span>
            <span class="logo-text">Food <span class="highlight">Express</span></span>
            <span class="logo-emojis">🍕🍟</span>
          </div>

          <!-- Welcome Header -->
          <div class="card-header">
            <h2>Create Account</h2>
            <p>Join us to order delicious meals fast</p>
          </div>

          <!-- Register Form -->
          <form id="registerForm" novalidate>
            <!-- Full Name Input (Floating Label) -->
            <div class="floating-group">
              <div class="floating-wrapper">
                <i class="fa-regular fa-user input-icon"></i>
                <input type="text" id="fullName" placeholder=" " autocomplete="name">
                <label for="fullName">Full Name</label>
              </div>
              <span class="error-message" id="fullNameError"></span>
            </div>

            <!-- Email Input (Floating Label) -->
            <div class="floating-group">
              <div class="floating-wrapper">
                <i class="fa-regular fa-envelope input-icon"></i>
                <input type="email" id="email" placeholder=" " autocomplete="email">
                <label for="email">Email Address</label>
              </div>
              <span class="error-message" id="emailError"></span>
            </div>

            <!-- Phone Number Input (Floating Label) -->
            <div class="floating-group">
              <div class="floating-wrapper">
                <i class="fa-solid fa-phone input-icon"></i>
                <input type="tel" id="phone" placeholder=" " autocomplete="tel" maxlength="10">
                <label for="phone">Phone Number</label>
              </div>
              <span class="error-message" id="phoneError"></span>
            </div>

            <!-- Password Input (Floating Label) -->
            <div class="floating-group">
              <div class="floating-wrapper">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" id="password" placeholder=" " autocomplete="new-password">
                <label for="password">Password</label>
                <button type="button" id="togglePassword" class="password-toggle-btn" aria-label="Toggle password visibility">
                  <i class="fa-regular fa-eye" id="eyeIcon"></i>
                </button>
              </div>
              <span class="error-message" id="passwordError"></span>
            </div>

            <!-- Confirm Password Input (Floating Label) -->
            <div class="floating-group">
              <div class="floating-wrapper">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" id="confirmPassword" placeholder=" " autocomplete="new-password">
                <label for="confirmPassword">Confirm Password</label>
                <button type="button" id="toggleConfirmPassword" class="password-toggle-btn" aria-label="Toggle confirm password visibility">
                  <i class="fa-regular fa-eye" id="confirmEyeIcon"></i>
                </button>
              </div>
              <span class="error-message" id="confirmPasswordError"></span>
            </div>

            <!-- Gender Selection (Radio buttons) -->
            <div class="gender-group">
              <label>Gender</label>
              <div class="gender-radio-group">
                <label class="radio-container">
                  <input type="radio" name="gender" value="male">
                  <span class="custom-radio"></span>
                  Male
                </label>
                <label class="radio-container">
                  <input type="radio" name="gender" value="female">
                  <span class="custom-radio"></span>
                  Female
                </label>
                <label class="radio-container">
                  <input type="radio" name="gender" value="others">
                  <span class="custom-radio"></span>
                  Others
                </label>
              </div>
              <span class="error-message" id="genderError"></span>
            </div>

            <!-- Terms & Conditions Checkbox -->
            <div class="form-options">
              <label class="checkbox-container">
                <input type="checkbox" id="terms">
                <span class="custom-checkbox"></span>
                I agree to the <a href="#" class="forgot-link">Terms & Conditions</a>
              </label>
            </div>
            <span class="error-message" id="termsError" style="margin-top: -15px; margin-bottom: 20px;"></span>

            <!-- Register Button -->
            <button type="submit" id="registerBtn" class="btn btn-primary">
              <span class="btn-text">Create Account</span>
              <span class="spinner" id="btnSpinner"></span>
            </button>
          </form>

          <!-- Divider -->
          <div class="divider">
            <span>or sign up with</span>
          </div>

          <!-- Social Registration -->
          <div class="social-buttons">
            <button class="btn btn-social btn-google">
              <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google logo" class="social-icon-img">
              <span>Google</span>
            </button>
            <button class="btn btn-social btn-facebook">
              <i class="fa-brands fa-facebook-f social-icon"></i>
              <span>Facebook</span>
            </button>
          </div>

          <!-- Bottom Text -->
          <p class="register-text">
            Already have an account? <a href="login.html" class="register-link">Login</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- Custom Script -->
  <script src="js/register.js"></script>
</body>
</html>
